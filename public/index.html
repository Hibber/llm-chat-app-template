<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Nova Chat</title>
		<style>
			:root {
				--bg-start: #0f172a;
				--bg-end: #1e1b4b;
				--panel-bg: rgba(15, 23, 42, 0.72);
				--panel-border: rgba(148, 163, 184, 0.2);
				--message-bg: rgba(30, 41, 59, 0.8);
				--text-color: #e2e8f0;
				--text-muted: #94a3b8;
				--accent: #8b5cf6;
				--accent-hover: #7c3aed;
				--user-msg-bg: linear-gradient(135deg, #8b5cf6, #6366f1);
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
					Cantarell, sans-serif;
				line-height: 1.5;
				color: var(--text-color);
				min-height: 100vh;
				background: radial-gradient(circle at top, var(--bg-end), var(--bg-start));
				display: grid;
				place-items: center;
				padding: 1.25rem;
			}

			main {
				width: min(920px, 100%);
			}

			header {
				margin-bottom: 1rem;
			}

			h1 {
				font-size: clamp(1.6rem, 2vw, 2rem);
				font-weight: 700;
			}

			header p {
				color: var(--text-muted);
				margin-top: 0.25rem;
			}

			.chat-container {
				display: flex;
				flex-direction: column;
				height: min(76vh, 780px);
				min-height: 500px;
				border: 1px solid var(--panel-border);
				border-radius: 18px;
				overflow: hidden;
				background: var(--panel-bg);
				backdrop-filter: blur(20px);
				box-shadow: 0 24px 80px rgba(2, 6, 23, 0.55);
			}

			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1.25rem;
			}

			.message {
				margin-bottom: 0.85rem;
				padding: 0.8rem 1rem;
				border-radius: 14px;
				max-width: 80%;
				background: var(--message-bg);
				border: 1px solid rgba(148, 163, 184, 0.12);
			}

			.message p {
				white-space: pre-line;
				margin: 0;
				overflow-wrap: anywhere;
			}

			.user-message {
				background: var(--user-msg-bg);
				border: none;
				align-self: flex-end;
				margin-left: auto;
			}

			.assistant-message {
				align-self: flex-start;
			}

			.message-input {
				display: flex;
				padding: 1rem;
				border-top: 1px solid var(--panel-border);
				background-color: rgba(15, 23, 42, 0.5);
				gap: 0.65rem;
			}

			#user-input {
				flex: 1;
				padding: 0.75rem;
				border: 1px solid var(--panel-border);
				border-radius: 12px;
				font-family: inherit;
				resize: none;
				min-height: 44px;
				background: rgba(15, 23, 42, 0.6);
				color: var(--text-color);
				outline: none;
			}

			#send-button {
				padding: 0 1.1rem;
				background-color: var(--accent);
				color: white;
				border: none;
				border-radius: 12px;
				cursor: pointer;
				transition:
					background-color 0.2s,
					transform 0.2s;
				font-weight: 600;
			}

			#send-button:hover {
				background-color: var(--accent-hover);
				transform: translateY(-1px);
			}

			#send-button:disabled {
				background-color: #475569;
				cursor: not-allowed;
				transform: none;
			}

			.typing-indicator {
				display: none;
				font-style: italic;
				color: var(--text-muted);
				padding: 0 1rem 0.8rem;
			}

			.typing-indicator.visible {
				display: block;
			}

			footer {
				margin-top: 1rem;
				font-size: 0.82rem;
				color: var(--text-muted);
			}
		</style>
	</head>
	<body>
		<main>
			<header>
				<h1>Nova Chat</h1>
				<p>Your fast, modern AI conversation space</p>
			</header>

			<div class="chat-container">
				<div id="chat-messages" class="chat-messages">
					<div class="message assistant-message">
						<p>Hello! I’m Nova. What would you like to talk about today?</p>
					</div>
				</div>

				<div class="typing-indicator" id="typing-indicator">
					Thinking...
				</div>

				<div class="message-input">
					<textarea
						id="user-input"
						placeholder="Message Nova..."
						rows="1"
						autofocus
					></textarea>
					<button id="send-button">Send</button>
				</div>
			</div>

			<footer>
				<p>Nova Chat &copy; 2026</p>
			</footer>
		</main>

		<!-- Chat app script -->
		<script src="chat.js"></script>
	</body>
</html>
